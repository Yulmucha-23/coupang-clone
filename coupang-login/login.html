<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>쿠팡 로그인</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        justify-content: center;
        padding-top: 50px;
        background-color: #fff;
        font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      }

      .login-wrapper {
        width: 350px;
      }

      .logo {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo img {
        width: 180px;
      }

      .login-tabs {
        display: flex;
        list-style: none;
        padding: 0;
        margin-bottom: 20px;
      }

      .login-tabs li {
        flex: 1;
        text-align: center;
        padding: 12px 0;
        cursor: pointer;
        font-size: 14px;
        color: #555;
        border-bottom: 2px solid #ccc;
      }

      .login-tabs li.active {
        color: #0074e9;
        font-weight: bold;
        border-bottom: 2px solid #0074e9;
      }

      .input-group {
        border: 1px solid #ccc;
        margin-bottom: 10px;
      }

      .input-row {
        display: flex;
        align-items: center;
        padding: 10px;
        position: relative;
      }

      .input-row:first-child {
        border-bottom: 1px solid #ccc;
      }

      .icon {
        width: 20px;
        height: 20px;
        background-color: #eee;
        flex-shrink: 0;
      }

      .input-row input {
        border: none;
        outline: none;
        flex: 1;
        margin-left: 10px;
        font-size: 14px;
      }

      .login-helper {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        font-size: 12px;
        color: #555;
      }

      .login-helper a {
        text-decoration: none;
        color: #0073e9;
      }

      .btn-login {
        width: 100%;
        padding: 14px;
        background-color: #0073e9;
        color: #fff;
        border: none;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
      }

      .divider {
        margin: 25px 0;
        border-top: 1px solid #eee;
      }

      .btn-signup {
        width: 100%;
        padding: 12px;
        background-color: #fff;
        color: #333;
        border: 1px solid #ccc;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
      }

      footer {
        text-align: center;
        margin-top: 30px;
        font-size: 11px;
        color: #999;
      }
    </style>
  </head>
  <body>
    <div class="login-wrapper">
      <div class="logo">
        <img src="logo.jpg" alt="Coupang" />
      </div>

      <ul class="login-tabs">
        <li class="active">이메일 로그인</li>
        <li>휴대폰번호 로그인</li>
        <li>QR코드 로그인</li>
      </ul>

      <form class="login-form">
        <div class="input-group">
          <div class="input-row">
            <span class="icon"></span>
            <input type="email" placeholder="아이디(이메일)" required />
          </div>
          <div class="input-row">
            <span class="icon"></span>
            <input type="password" placeholder="비밀번호" required />
          </div>
        </div>

        <div class="login-helper">
          <label><input type="checkbox" /> 자동로그인</label>
          <a href="#">아이디(이메일)/비밀번호 찾기 ></a>
        </div>

        <button type="submit" class="btn-login">로그인</button>
      </form>

      <div class="divider"></div>

      <button type="button" class="btn-signup">회원가입</button>

      <footer>
        <p>©Coupang Corp. All rights reserved.</p>
      </footer>
    </div>
  </body>
</html>
